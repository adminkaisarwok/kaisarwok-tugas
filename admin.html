<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petinggi — Kaisar Wok</title>
<link rel="stylesheet" href="styles.css">
<script>window.KW_REQUIRE='petinggi';</script>
<script src="auth.js"></script>
</head>
<body>
<div class="topbar">
  <div class="brand-mini">
    <img src="logo.png" alt="Kaisar Wok" class="logo-mini"
         onerror="this.remove();document.getElementById('bm').style.display='flex';">
    <div id="bm" style="display:none;align-items:center;gap:10px;">
      <svg class="emblem-mini" viewBox="0 0 100 100" fill="none" stroke="#d4af37" stroke-width="3">
        <circle cx="50" cy="50" r="46"/><path d="M27 57 Q50 80 73 57" stroke-linecap="round"/>
        <path d="M44 52 q-5 -8 1 -13" stroke-width="2"/><path d="M52 52 q5 -8 -1 -13" stroke-width="2"/>
      </svg>
      <span class="mini-name">Kaisar Wok</span>
    </div>
  </div>
  <span class="spacer"></span>
  <a href="index.html">Beranda</a>
  <a href="marketing.html">Marketing</a>
  <a href="staff.html">Staff</a>
  <a href="kalender.html">Kalender</a>
  <a href="reservasi.html">Reservasi</a>
  <a href="admin.html" class="active">Petinggi</a>
</div>

<div class="container">
  <header class="page">
    <h1>👑 Panel Petinggi</h1>
    <p>Setujui atau tolak tugas yang diajukan staff</p>
  </header>

  <div id="panel">
    <div class="card">
      <h2>⏳ Menunggu Approval <span class="count" id="countPending">0</span></h2>
      <div id="listPending"></div>
    </div>
    <div class="card">
      <h2>✅ Sudah Disetujui <span class="count" id="countApproved">0</span></h2>
      <div id="listApproved"></div>
    </div>
  </div>

  <p class="note">Tugas dari Marketing & Staff yang diajukan akan muncul di sini.</p>
</div>

<script>
const API='api.php';
const STATUS={ todo:{label:'Dikerjakan',cls:'todo'}, pending:{label:'Menunggu Approval',cls:'pending'}, approved:{label:'✓ Selesai',cls:'approved'} };
const CAT_LABEL={ marketing:'Marketing', staff:'Staff Lainnya' };
let cache=[];
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtStamp(ts){ return new Date(ts).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

async function setStatus(id,status){
  const r=await fetch(API+'?action=setStatus',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status})});
  if(r.status===401){ location.replace('login.html'); return; }
  if(r.status===403){ alert('Hanya petinggi yang bisa melakukan ini.'); return; }
  load();
}
function approve(id){ setStatus(id,'approved'); }
function reject(id){ setStatus(id,'todo'); }
function unapprove(id){ setStatus(id,'pending'); }

async function load(){
  try{ const r=await fetch(API+'?action=list'); cache=await r.json(); draw(); }catch(e){ console.error(e); }
}
function taskRow(t,kind){
  const s=STATUS[t.status], done=t.status==='approved'; let a='';
  if(kind==='pending'){
    a+=`<button class="btn-approve" onclick="approve(${t.id})">✓ Approve</button>`;
    a+=`<button class="btn-reject" onclick="reject(${t.id})">Tolak</button>`;
  } else { a+=`<button class="btn-reject" onclick="unapprove(${t.id})">Batalkan Approval</button>`; }
  const who = t.name ? ` &middot; oleh <b style="color:var(--gold-soft)">${escapeHtml(t.name)}</b>` : '';
  const proof = t.photo
    ? `<a class="proof" href="${t.photo}" target="_blank"><img src="${t.photo}" alt="bukti"><span>📷 Bukti oleh <b>${escapeHtml(t.photoBy||'-')}</b><br>${fmtStamp(t.photoAt)} &middot; klik untuk perbesar</span></a>`
    : `<div class="no-proof">📷 Belum ada foto bukti</div>`;
  const linkHtml = t.link ? `<br><a class="tasklink" href="${escapeHtml(t.link)}" target="_blank" rel="noopener">🔗 ${escapeHtml(t.link)}</a>` : '';
  return `<div class="task ${done?'done':''}"><div class="task-top"><span class="task-title">${escapeHtml(t.title)}</span><span class="badge ${s.cls}">${s.label}</span></div><div class="task-meta">${CAT_LABEL[t.category]}${who} &middot; dibuat ${fmtDate(t.created)}</div>${linkHtml}${proof}<div class="task-actions">${a}</div></div>`;
}
function draw(){
  const pending=cache.filter(t=>t.status==='pending');
  const approved=cache.filter(t=>t.status==='approved');
  document.getElementById('countPending').textContent=pending.length;
  document.getElementById('countApproved').textContent=approved.length;
  document.getElementById('listPending').innerHTML=pending.length?pending.map(t=>taskRow(t,'pending')).join(''):'<div class="empty">Tidak ada pengajuan menunggu approval</div>';
  document.getElementById('listApproved').innerHTML=approved.length?approved.map(t=>taskRow(t,'approved')).join(''):'<div class="empty">Belum ada tugas yang disetujui</div>';
}
// jalan hanya setelah auth.js memastikan ini petinggi
document.addEventListener('kw-auth', function(e){
  if(e.detail && e.detail.role==='petinggi'){ load(); setInterval(load, 4000); }
});
</script>
</body>
</html>
